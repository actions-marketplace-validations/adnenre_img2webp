name: Test img2webp Action

on:
  push:

jobs:
  test-img2webp:
    name: Test img2webp Conversion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install img2webp
        run: go install github.com/adnenre/img2webp/v2@v2.0.0

      - name: Run image conversion
        run: |
          img2webp \
            --input "./public" \
            --q "85" \
            --replace "true"

      - name: Verify WebP files exist
        run: |
          if ! find public -name "*.webp" | grep .; then
            echo "❌ No WebP files generated"
            exit 1
          fi
