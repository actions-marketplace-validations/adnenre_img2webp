name: Test img2webp Action

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install img2webp
        run: go install github.com/adnenre/img2webp@v2.0.0

      - name: Run conversion
        run: |
          img2webp \
            --input "./public" \
            --q "85" \
            --replace "true"

      - name: Verify WebP files exist
        run: |
          if ! find public -name "*.webp" | grep .; then
            echo "❌ No WebP files generated"
            exit 1
          fi

      - name: Verify references updated
        run: |
          if grep -r "\.png\|\.jpg\|\.jpeg" public --include="*.html" --include="*.css"; then
            echo "❌ Old image references still exist"
            exit 1
          fi
