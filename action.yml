name: "img2webp"
description: "Convert images to WebP and automatically update references in HTML, CSS, JS, MD"
author: "Adnen Rebai"
branding:
  icon: "image"
  color: "blue"
inputs:
  input-dir:
    description: "Directory to scan for images"
    required: false
    default: "."
  quality:
    description: "WebP quality (0-100)"
    required: false
    default: "75"
  lossless:
    description: "Use lossless compression"
    required: false
    default: "false"
  keep-original:
    description: "Keep original images after conversion"
    required: false
    default: "false"
  update-refs:
    description: "Rewrite image references in source files"
    required: false
    default: "true"
  dry-run:
    description: "Preview changes without writing"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Install Go (if not present)
      if: runner.os == 'ubuntu-latest'
      run: |
        if ! command -v go &> /dev/null; then
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://go.dev/dl/go1.26.2.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.26.2.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
        fi
      shell: bash
    - name: Install img2webp CLI
      run: go install github.com/adnenre/img2webp/v2@v2.0.0
      shell: bash
    - name: Run img2webp
      run: |
        img2webp \
          --input "${{ inputs.input-dir }}" \
          --quality "${{ inputs.quality }}" \
          --lossless "${{ inputs.lossless }}" \
          --keep-original "${{ inputs.keep-original }}" \
          --update-refs "${{ inputs.update-refs }}" \
          --dry-run "${{ inputs.dry-run }}"
      shell: bash
